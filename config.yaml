audio:
  device: "BlackHole 2ch"      # auto-detected if this exact name is found
  chunk_duration: 30           # seconds per WAV chunk on disk
  sample_rate: 16000
  channels: 1

notes:
  update_interval: 900         # seconds between mid-session note refreshes (default 15 min)

output:
  directory: "./sessions"
  tmp_directory: "./tmp"
  auto_delete_audio: true

server:
  host: "127.0.0.1"
  port: 8000
