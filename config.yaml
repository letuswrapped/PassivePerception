audio:
  device: "BlackHole 2ch"   # auto-detected if this exact name is found
  chunk_duration: 8          # seconds per audio chunk
  sample_rate: 16000
  channels: 1

transcription:
  model: "small.en"          # model size: tiny.en, base.en, small.en, medium.en, large-v3
  language: "en"
  device: "cpu"              # cpu or cuda — ignored on Apple Silicon (MLX auto-selected)

diarization:
  model: "pyannote/speaker-diarization-3.1"
  min_speakers: 2
  max_speakers: 8

notes:
  llm_model: "mlx-community/Llama-3.2-3B-Instruct-4bit"  # mlx-lm model (HF repo)
  update_interval: 300                                     # seconds between LLM passes

output:
  directory: "./sessions"
  tmp_directory: "./tmp"
  auto_delete_audio: true

server:
  host: "127.0.0.1"
  port: 8000
